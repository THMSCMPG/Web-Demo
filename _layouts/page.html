---
layout: default
---
<article class="page-article">
  <div class="container">
    <header class="page-header reveal">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.description %}
      <p class="page-desc">{{ page.description }}</p>
      {% endif %}
    </header>
    <div class="prose reveal">
      {{ content }}
    </div>
  </div>
</article>
