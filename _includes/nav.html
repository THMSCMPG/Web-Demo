<header class="site-header" id="site-header">
  <div class="container header-inner">

    <a class="site-logo" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
      {{ site.title }}
    </a>

    <nav class="main-nav" id="main-nav" aria-label="Main navigation">
      {% for link in site.nav_links %}
      <a class="nav-link{% if page.url contains link.url %} active{% endif %}"
         href="{{ link.url | relative_url }}">{{ link.title }}</a>
      {% endfor %}
    </nav>

    <div class="header-controls">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="menu-toggle" id="menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
        <span></span><span></span><span></span>
      </button>
    </div>

  </div>

  <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
    <nav aria-label="Mobile navigation">
      {% for link in site.nav_links %}
      <a class="mobile-link" href="{{ link.url | relative_url }}">{{ link.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
